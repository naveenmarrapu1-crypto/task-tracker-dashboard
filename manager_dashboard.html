<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard - Task Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;color:#2c3e50}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:18px 30px;position:sticky;top:0;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.header-row{max-width:1600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.6em}
.header-sub{opacity:.8;font-size:.85em;margin-top:4px}
.nav-tabs{display:flex;gap:5px;background:#16213e;padding:5px 30px;border-bottom:2px solid #0f3460}
.nav-tab{padding:10px 20px;color:#aaa;cursor:pointer;border-radius:5px 5px 0 0;transition:.3s;font-weight:600;font-size:.9em}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-tab.active{color:#fff;background:#0f3460;border-bottom:3px solid #e94560}
.container{max-width:1600px;margin:0 auto;padding:20px}
.page{display:none}.page.active{display:block}
.filters{background:#fff;padding:15px 20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;min-width:150px}
.fg label{font-weight:600;font-size:.8em;color:#667eea;margin-bottom:4px}
.fg select,.fg input{padding:8px 10px;border:1.5px solid #ddd;border-radius:5px;font-size:.9em}
.fg select:focus,.fg input:focus{outline:none;border-color:#667eea}
.btn{padding:8px 18px;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-size:.85em;transition:.2s}
.btn-p{background:#667eea;color:#fff}.btn-p:hover{background:#5568d3}
.btn-s{background:#95a5a6;color:#fff}.btn-s:hover{background:#7f8c8d}
.btn-d{background:#e74c3c;color:#fff}.btn-d:hover{background:#c0392b}
.btn-g{background:#2ecc71;color:#fff}.btn-g:hover{background:#27ae60}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:25px}
.sc{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;transition:.3s;border-left:4px solid #667eea}
.sc:hover{transform:translateY(-3px);box-shadow:0 4px 15px rgba(0,0,0,.12)}
.sc .num{font-size:2.2em;font-weight:bold;color:#1a1a2e}.sc .lbl{color:#7f8c8d;font-size:.9em;margin-top:3px}
.sc.green{border-left-color:#2ecc71}.sc.orange{border-left-color:#f39c12}.sc.red{border-left-color:#e74c3c}.sc.purple{border-left-color:#9b59b6}.sc.blue{border-left-color:#3498db}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;margin-bottom:25px}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h3{color:#1a1a2e;margin-bottom:15px;font-size:1.1em;display:flex;justify-content:space-between;align-items:center}
table{width:100%;border-collapse:collapse}
th{background:#1a1a2e;color:#fff;padding:10px 12px;text-align:left;font-size:.85em;position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid #ecf0f1;font-size:.85em}
tr:hover{background:#f8f9fa}
tr.clickable{cursor:pointer}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.b-done{background:#2ecc71;color:#fff}.b-prog{background:#f39c12;color:#fff}.b-hold{background:#e74c3c;color:#fff}.b-post{background:#95a5a6;color:#fff}
.pbar{width:100%;height:6px;background:#ecf0f1;border-radius:3px;overflow:hidden;margin-top:4px}
.pfill{height:100%;background:linear-gradient(90deg,#2ecc71,#27ae60);transition:width .3s}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2000;overflow-y:auto}
.modal-box{background:#fff;max-width:900px;margin:40px auto;padding:30px;border-radius:15px;position:relative}
.modal-x{position:absolute;top:10px;right:15px;font-size:1.8em;cursor:pointer;color:#95a5a6}.modal-x:hover{color:#e74c3c}
.search{width:100%;padding:10px 15px;border:2px solid #e0e0e0;border-radius:5px;font-size:.9em;margin-bottom:15px}
.search:focus{outline:none;border-color:#667eea}
.risk-high{background:#ffeaea!important}.risk-med{background:#fff8e1!important}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75em;margin:2px;background:#e8eaf6;color:#3f51b5}
.empty{text-align:center;padding:40px;color:#95a5a6;font-size:1.1em}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.filters{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
<div class="header-row">
<div><h1>📊 Manager Dashboard - Task Tracker</h1><div class="header-sub">Generated: March 20, 2026 11:58 AM</div></div>
</div>
</div>
<div class="nav-tabs">
<div class="nav-tab active" onclick="showPage('overview')">📈 Overview</div>
<div class="nav-tab" onclick="showPage('tasks')">📋 All Tasks</div>
<div class="nav-tab" onclick="showPage('team')">👥 Team View</div>
<div class="nav-tab" onclick="showPage('timeline')">📅 Timeline</div>
<div class="nav-tab" onclick="showPage('risks')">⚠️ Risks</div>
</div>
<div class="container">
<!-- Filters -->
<div class="filters">
<div class="fg"><label>Month</label><select id="fMonth"><option value="">All</option></select></div>
<div class="fg"><label>Team</label><select id="fTeam"><option value="">All</option></select></div>
<div class="fg"><label>Status</label><select id="fStatus"><option value="">All</option><option>Completed</option><option>In Progress</option><option>On Hold</option><option>Postponed</option></select></div>
<div class="fg"><label>Sprint</label><select id="fSprint"><option value="">All</option></select></div>
<div class="fg"><label>From</label><input type="date" id="fStart"></div>
<div class="fg"><label>To</label><input type="date" id="fEnd"></div>
<button class="btn btn-p" onclick="applyFilters()">Apply</button>
<button class="btn btn-s" onclick="resetFilters()">Reset</button>
<button class="btn btn-g" onclick="exportData()">📥 Export</button>
</div>

<!-- Overview Page -->
<div class="page active" id="overview">
<div class="stats" id="statsGrid"></div>
<div class="grid2">
<div class="card"><h3>Status Distribution</h3><canvas id="statusChart"></canvas></div>
<div class="card"><h3>Team Workload</h3><canvas id="teamChart"></canvas></div>
<div class="card"><h3>Sprint Progress</h3><canvas id="sprintChart"></canvas></div>
<div class="card"><h3>Monthly Trend</h3><canvas id="trendChart"></canvas></div>
</div>
</div>

<!-- Tasks Page -->
<div class="page" id="tasks">
<div class="card">
<input type="text" class="search" id="taskSearch" placeholder="🔍 Search tasks..." onkeyup="searchTasks()">
<div style="overflow-x:auto"><table id="taskTable"></table></div>
</div>
</div>

<!-- Team Page -->
<div class="page" id="team">
<div class="card"><h3>Team Performance</h3><div id="teamDetails"></div></div>
</div>

<!-- Timeline Page -->
<div class="page" id="timeline">
<div class="card"><h3>Task Timeline</h3><div id="timelineView"></div></div>
</div>

<!-- Risks Page -->
<div class="page" id="risks">
<div class="card"><h3>⚠️ Risk Dashboard</h3><div id="riskView"></div></div>
</div>
</div>

<!-- Task Detail Modal -->
<div class="modal" id="taskModal">
<div class="modal-box">
<span class="modal-x" onclick="closeModal()">&times;</span>
<div id="taskDetail"></div>
</div>
</div>

let filteredTasks = [...allTasks];
let charts = {};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  populateFilters();
  applyFilters();
});

function populateFilters() {
  const months = [...new Set(allTasks.map(t => t.assigned.substring(0,7)).filter(m => m && m !== 'nan'))].sort();
  const teams = [...new Set(allTasks.map(t => t.who).filter(t => t && t !== 'nan'))].sort();
  const sprints = [...new Set(allTasks.map(t => t.sprint).filter(s => s && s !== 'nan'))].sort();
  
  document.getElementById('fMonth').innerHTML += months.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('fTeam').innerHTML += teams.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('fSprint').innerHTML += sprints.map(s => `<option value="${s}">${s}</option>`).join('');
}

function applyFilters() {
  const month = document.getElementById('fMonth').value;
  const team = document.getElementById('fTeam').value;
  const status = document.getElementById('fStatus').value;
  const sprint = document.getElementById('fSprint').value;
  const start = document.getElementById('fStart').value;
  const end = document.getElementById('fEnd').value;
  
  filteredTasks = allTasks.filter(t => {
    if (month && !t.assigned.startsWith(month)) return false;
    if (team && t.who !== team) return false;
    if (status && t.status !== status) return false;
    if (sprint && t.sprint !== sprint) return false;
    if (start && t.assigned < start) return false;
    if (end && t.assigned > end) return false;
    return true;
  });
  
  updateDashboard();
}

function resetFilters() {
  document.getElementById('fMonth').value = '';
  document.getElementById('fTeam').value = '';
  document.getElementById('fStatus').value = '';
  document.getElementById('fSprint').value = '';
  document.getElementById('fStart').value = '';
  document.getElementById('fEnd').value = '';
  applyFilters();
}

function updateDashboard() {
  updateStats();
  updateCharts();
  updateTaskTable();
  updateTeamView();
  updateTimeline();
  updateRisks();
}

function updateStats() {
  const total = filteredTasks.length;
  const done = filteredTasks.filter(t => t.status === 'Completed').length;
  const prog = filteredTasks.filter(t => t.status === 'In Progress').length;
  const hold = filteredTasks.filter(t => t.status === 'On Hold').length;
  const rate = total > 0 ? ((done/total)*100).toFixed(1) : 0;
  
  const today = new Date().toISOString().split('T')[0];
  const overdue = filteredTasks.filter(t => t.due && t.due < today && t.status !== 'Completed').length;
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="sc blue" onclick="filterByStatus('')"><div class="num">${total}</div><div class="lbl">Total Tasks</div></div>
    <div class="sc green" onclick="filterByStatus('Completed')"><div class="num">${done}</div><div class="lbl">Completed</div></div>
    <div class="sc orange" onclick="filterByStatus('In Progress')"><div class="num">${prog}</div><div class="lbl">In Progress</div></div>
    <div class="sc red" onclick="filterByStatus('On Hold')"><div class="num">${hold}</div><div class="lbl">On Hold</div></div>
    <div class="sc purple"><div class="num">${rate}%</div><div class="lbl">Completion Rate</div></div>
    <div class="sc red"><div class="num">${overdue}</div><div class="lbl">⚠️ Overdue</div></div>
  `;
}

function filterByStatus(status) {
  document.getElementById('fStatus').value = status;
  applyFilters();
  showPage('tasks');
}

function updateCharts() {
  // Status Chart
  const statusData = {};
  filteredTasks.forEach(t => statusData[t.status] = (statusData[t.status] || 0) + 1);
  
  if (charts.status) charts.status.destroy();
  charts.status = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(statusData),
      datasets: [{
        data: Object.values(statusData),
        backgroundColor: ['#2ecc71','#f39c12','#e74c3c','#95a5a6']
      }]
    },
    options: {responsive: true, plugins: {legend: {position: 'bottom'}}}
  });
  
  // Team Chart
  const teamData = {};
  filteredTasks.forEach(t => teamData[t.who] = (teamData[t.who] || 0) + 1);
  const topTeams = Object.entries(teamData).sort((a,b) => b[1] - a[1]).slice(0,10);
  
  if (charts.team) charts.team.destroy();
  charts.team = new Chart(document.getElementById('teamChart'), {
    type: 'bar',
    data: {
      labels: topTeams.map(t => t[0]),
      datasets: [{label: 'Tasks', data: topTeams.map(t => t[1]), backgroundColor: '#667eea'}]
    },
    options: {responsive: true, scales: {y: {beginAtZero: true}}, onClick: (e, items) => {
      if (items.length) {
        const team = topTeams[items[0].index][0];
        document.getElementById('fTeam').value = team;
        applyFilters();
        showPage('tasks');
      }
    }}
  });
  
  // Sprint Chart
  const sprintData = {};
  filteredTasks.forEach(t => {
    if (!sprintData[t.sprint]) sprintData[t.sprint] = {done:0, prog:0, hold:0};
    if (t.status === 'Completed') sprintData[t.sprint].done++;
    else if (t.status === 'In Progress') sprintData[t.sprint].prog++;
    else if (t.status === 'On Hold') sprintData[t.sprint].hold++;
  });
  
  const sprints = Object.keys(sprintData).filter(s => s && s !== 'nan').sort();
  
  if (charts.sprint) charts.sprint.destroy();
  charts.sprint = new Chart(document.getElementById('sprintChart'), {
    type: 'bar',
    data: {
      labels: sprints,
      datasets: [
        {label: 'Completed', data: sprints.map(s => sprintData[s].done), backgroundColor: '#2ecc71'},
        {label: 'In Progress', data: sprints.map(s => sprintData[s].prog), backgroundColor: '#f39c12'},
        {label: 'On Hold', data: sprints.map(s => sprintData[s].hold), backgroundColor: '#e74c3c'}
      ]
    },
    options: {responsive: true, scales: {x: {stacked: true}, y: {stacked: true, beginAtZero: true}}}
  });
  
  // Trend Chart
  const monthData = {};
  filteredTasks.forEach(t => {
    const m = t.assigned.substring(0,7);
    if (m && m !== 'nan') {
      if (!monthData[m]) monthData[m] = {done:0, prog:0};
      if (t.status === 'Completed') monthData[m].done++;
      else if (t.status === 'In Progress') monthData[m].prog++;
    }
  });
  
  const months = Object.keys(monthData).sort().slice(-6);
  
  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        {label: 'Completed', data: months.map(m => monthData[m].done), borderColor: '#2ecc71', fill: false},
        {label: 'In Progress', data: months.map(m => monthData[m].prog), borderColor: '#f39c12', fill: false}
      ]
    },
    options: {responsive: true, scales: {y: {beginAtZero: true}}, onClick: (e, items) => {
      if (items.length) {
        const month = months[items[0].index];
        document.getElementById('fMonth').value = month;
        applyFilters();
        showPage('tasks');
      }
    }}
  });
}

function updateTaskTable() {
  const html = `
    <thead><tr>
      <th>Task</th><th>Responsible</th><th>Status</th><th>Sprint</th><th>Assigned</th><th>Due</th><th>Action</th>
    </tr></thead>
    <tbody>${filteredTasks.map(t => {
      const overdue = t.due && t.due < new Date().toISOString().split('T')[0] && t.status !== 'Completed';
      const badge = t.status === 'Completed' ? 'b-done' : t.status === 'In Progress' ? 'b-prog' : t.status === 'On Hold' ? 'b-hold' : 'b-post';
      return `<tr class="${overdue ? 'risk-high' : ''} clickable" onclick="showTaskDetail(${t.id})">
        <td>${t.task.substring(0,50)}${t.task.length > 50 ? '...' : ''}</td>
        <td>${t.who}</td>
        <td><span class="badge ${badge}">${t.status}</span></td>
        <td>${t.sprint}</td>
        <td>${t.assigned.substring(0,10)}</td>
        <td>${t.due.substring(0,10)}${overdue ? ' ⚠️' : ''}</td>
        <td><button class="btn btn-p" onclick="event.stopPropagation();showTaskDetail(${t.id})">View</button></td>
      </tr>`;
    }).join('')}</tbody>
  `;
  document.getElementById('taskTable').innerHTML = html || '<tr><td colspan="7" class="empty">No tasks found</td></tr>';
}

function searchTasks() {
  const q = document.getElementById('taskSearch').value.toLowerCase();
  const rows = document.querySelectorAll('#taskTable tbody tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
  });
}

function updateTeamView() {
  const teamStats = {};
  filteredTasks.forEach(t => {
    if (!teamStats[t.who]) teamStats[t.who] = {total:0, done:0, prog:0, hold:0};
    teamStats[t.who].total++;
    if (t.status === 'Completed') teamStats[t.who].done++;
    else if (t.status === 'In Progress') teamStats[t.who].prog++;
    else if (t.status === 'On Hold') teamStats[t.who].hold++;
  });
  
  const html = `<table>
    <thead><tr><th>Team Member</th><th>Total</th><th>Completed</th><th>In Progress</th><th>On Hold</th><th>Rate</th><th>Progress</th></tr></thead>
    <tbody>${Object.entries(teamStats).sort((a,b) => b[1].total - a[1].total).map(([name, stats]) => {
      const rate = ((stats.done / stats.total) * 100).toFixed(1);
      return `<tr class="clickable" onclick="document.getElementById('fTeam').value='${name}';applyFilters();showPage('tasks')">
        <td><strong>${name}</strong></td>
        <td>${stats.total}</td>
        <td><span class="badge b-done">${stats.done}</span></td>
        <td><span class="badge b-prog">${stats.prog}</span></td>
        <td><span class="badge b-hold">${stats.hold}</span></td>
        <td>${rate}%</td>
        <td><div class="pbar"><div class="pfill" style="width:${rate}%"></div></div></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
  document.getElementById('teamDetails').innerHTML = html;
}

function updateTimeline() {
  const byMonth = {};
  filteredTasks.forEach(t => {
    const m = t.assigned.substring(0,7);
    if (m && m !== 'nan') {
      if (!byMonth[m]) byMonth[m] = [];
      byMonth[m].push(t);
    }
  });
  
  const html = Object.entries(byMonth).sort((a,b) => b[0].localeCompare(a[0])).map(([month, tasks]) => `
    <div class="card" style="margin-bottom:15px">
      <h3>${month} (${tasks.length} tasks) <button class="btn btn-p btn-sm" onclick="document.getElementById('fMonth').value='${month}';applyFilters();showPage('tasks')">View All</button></h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px">
        ${tasks.slice(0,6).map(t => `
          <div style="padding:10px;background:#f8f9fa;border-radius:5px;cursor:pointer" onclick="showTaskDetail(${t.id})">
            <div style="font-weight:600;font-size:.85em;margin-bottom:5px">${t.task.substring(0,40)}...</div>
            <div style="font-size:.75em;color:#7f8c8d">${t.who}</div>
            <span class="badge ${t.status === 'Completed' ? 'b-done' : t.status === 'In Progress' ? 'b-prog' : 'b-hold'}">${t.status}</span>
          </div>
        `).join('')}
        ${tasks.length > 6 ? `<div style="padding:10px;text-align:center;color:#667eea;cursor:pointer" onclick="document.getElementById('fMonth').value='${month}';applyFilters();showPage('tasks')">+${tasks.length - 6} more</div>` : ''}
      </div>
    </div>
  `).join('');
  document.getElementById('timelineView').innerHTML = html || '<div class="empty">No timeline data</div>';
}

function updateRisks() {
  const today = new Date().toISOString().split('T')[0];
  const overdue = filteredTasks.filter(t => t.due && t.due < today && t.status !== 'Completed');
  const upcoming = filteredTasks.filter(t => {
    if (!t.due || t.status === 'Completed') return false;
    const days = Math.ceil((new Date(t.due) - new Date(today)) / (1000*60*60*24));
    return days >= 0 && days <= 7;
  });
  const blocked = filteredTasks.filter(t => t.status === 'On Hold');
  
  const html = `
    <div class="stats" style="margin-bottom:20px">
      <div class="sc red"><div class="num">${overdue.length}</div><div class="lbl">⚠️ Overdue</div></div>
      <div class="sc orange"><div class="num">${upcoming.length}</div><div class="lbl">📅 Due This Week</div></div>
      <div class="sc red"><div class="num">${blocked.length}</div><div class="lbl">🚫 Blocked</div></div>
    </div>
    
    ${overdue.length > 0 ? `
      <h4 style="color:#e74c3c;margin:20px 0 10px">⚠️ Overdue Tasks</h4>
      <table>
        <thead><tr><th>Task</th><th>Responsible</th><th>Due Date</th><th>Days Overdue</th><th>Action</th></tr></thead>
        <tbody>${overdue.map(t => {
          const days = Math.ceil((new Date(today) - new Date(t.due)) / (1000*60*60*24));
          return `<tr class="risk-high clickable" onclick="showTaskDetail(${t.id})">
            <td>${t.task}</td><td>${t.who}</td><td>${t.due.substring(0,10)}</td><td>${days} days</td>
            <td><button class="btn btn-d" onclick="event.stopPropagation();showTaskDetail(${t.id})">View</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    ` : ''}
    
    ${upcoming.length > 0 ? `
      <h4 style="color:#f39c12;margin:20px 0 10px">📅 Due This Week</h4>
      <table>
        <thead><tr><th>Task</th><th>Responsible</th><th>Due Date</th><th>Days Left</th><th>Action</th></tr></thead>
        <tbody>${upcoming.map(t => {
          const days = Math.ceil((new Date(t.due) - new Date(today)) / (1000*60*60*24));
          return `<tr class="risk-med clickable" onclick="showTaskDetail(${t.id})">
            <td>${t.task}</td><td>${t.who}</td><td>${t.due.substring(0,10)}</td><td>${days} days</td>
            <td><button class="btn btn-p" onclick="event.stopPropagation();showTaskDetail(${t.id})">View</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    ` : ''}
  `;
  document.getElementById('riskView').innerHTML = html;
}

function showTaskDetail(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  
  const html = `
    <h2 style="color:#1a1a2e;margin-bottom:20px">${task.task}</h2>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:20px">
      <div><strong>Responsible:</strong> ${task.who}</div>
      <div><strong>Status:</strong> <span class="badge ${task.status === 'Completed' ? 'b-done' : task.status === 'In Progress' ? 'b-prog' : 'b-hold'}">${task.status}</span></div>
      <div><strong>Sprint:</strong> ${task.sprint}</div>
      <div><strong>Assigned:</strong> ${task.assigned.substring(0,10)}</div>
      <div><strong>Start:</strong> ${task.start.substring(0,10)}</div>
      <div><strong>End:</strong> ${task.end.substring(0,10)}</div>
      <div><strong>Due:</strong> ${task.due.substring(0,10)}</div>
    </div>
    <div style="margin-bottom:15px"><strong>Description:</strong><div style="background:#f8f9fa;padding:15px;border-radius:5px;margin-top:5px">${task.desc || 'No description'}</div></div>
    ${task.links && task.links !== 'nan' ? `<div style="margin-bottom:15px"><strong>Links:</strong><div style="margin-top:5px"><a href="${task.links}" target="_blank" style="color:#667eea">${task.links}</a></div></div>` : ''}
    ${task.comments && task.comments !== 'nan' ? `<div><strong>Comments:</strong><div style="background:#f8f9fa;padding:15px;border-radius:5px;margin-top:5px;max-height:200px;overflow-y:auto">${task.comments}</div></div>` : ''}
  `;
  document.getElementById('taskDetail').innerHTML = html;
  document.getElementById('taskModal').style.display = 'block';
}

function closeModal() {
  document.getElementById('taskModal').style.display = 'none';
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  event.target.classList.add('active');
}

function exportData() {
  const csv = [
    ['Task','Responsible','Status','Sprint','Assigned','Due','Description'],
    ...filteredTasks.map(t => [t.task, t.who, t.status, t.sprint, t.assigned, t.due, t.desc])
  ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
  
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tasks_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

window.onclick = (e) => {
  if (e.target.id === 'taskModal') closeModal();
};
</script>
</body>
</html>
